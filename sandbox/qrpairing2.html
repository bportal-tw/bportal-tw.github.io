<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>QR Pairing — B STUDIO PRODUCTION</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root{--orange:#F06022;--white:#fff}
html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif}
body{background:var(--orange);color:var(--white);display:flex;flex-direction:column;align-items:center;padding:18px}
.panel{width:100%;max-width:820px;background:rgba(255,255,255,0.06);border-radius:12px;padding:18px}
input{padding:12px;border-radius:8px;border:0;font-size:18px;width:100%}
button{padding:10px;border-radius:8px;border:0;background:#fff;color:#000}
#reader{margin-top:10px}
</style>
</head>

<body>
<div class="panel">

<h2>QR Pairing System</h2>

<input id="rowInput" placeholder="Row">
<input id="seatInput" placeholder="Seat">

<div id="qrField" style="display:none;">
  <input id="qrInput" placeholder="Scan QR">

  <div id="cameraContainer" style="display:none;">
    <div id="reader"></div>
  </div>

  <button id="submitQr">Submit</button>
</div>

<div id="message"></div>

</div>

<script>

/* ========= CONFIG ========= */
const FORM_RESPONSE_URL = 'YOUR_GOOGLE_FORM_URL';
const ENTRY_ROW = 'entry.xxx';
const ENTRY_SEAT = 'entry.xxx';
const ENTRY_QR = 'entry.xxx';

/* ========= ELEMENT ========= */
const rowInput = document.getElementById('rowInput');
const seatInput = document.getElementById('seatInput');
const qrInput = document.getElementById('qrInput');
const qrField = document.getElementById('qrField');
const message = document.getElementById('message');

/* ========= MOBILE CHECK ========= */
function isMobile(){
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

/* ========= CAMERA ========= */
let qrScanner = null;

function startCameraScanner(){
  if(qrScanner) return;

  qrScanner = new Html5Qrcode("reader");

  qrScanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      qrInput.value = decodedText.slice(0,32);
      submitPairing();
      stopCameraScanner();
    }
  );
}

function stopCameraScanner(){
  if(qrScanner){
    qrScanner.stop().then(()=>{
      qrScanner.clear();
      qrScanner = null;
    });
  }
}

/* ========= VALIDATE ========= */
function validate(){
  if(rowInput.value && seatInput.value){
    qrField.style.display = 'block';

    if(isMobile()){
      document.getElementById('cameraContainer').style.display = 'block';
      startCameraScanner();
    }
  }
}

rowInput.addEventListener('input', validate);
seatInput.addEventListener('input', validate);

/* ========= SUBMIT ========= */
function submitPairing(){
  const body = new URLSearchParams();
  body.append(ENTRY_ROW, rowInput.value);
  body.append(ENTRY_SEAT, seatInput.value);
  body.append(ENTRY_QR, qrInput.value);

  fetch(FORM_RESPONSE_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: body
  });

  message.innerText = "Saved!";
  reset();
}

document.getElementById('submitQr').onclick = submitPairing;

/* ========= RESET ========= */
function reset(){
  stopCameraScanner();
  document.getElementById('cameraContainer').style.display = 'none';

  rowInput.value = '';
  seatInput.value = '';
  qrInput.value = '';
  qrField.style.display = 'none';
}

</script>

</body>
</html>
